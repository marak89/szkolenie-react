services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: vite-react-dev
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app               # Mapuje lokalny kod do kontenera
      - /app/node_modules    # Chroni przed nadpisaniem modułów z kontenera przez lokalny system
    environment:
      - CHOKIDAR_USEPOLLING=true # Naprawia problemy z odświeżaniem na niektórych systemach (np. Windows/WSL)
      - WATCHPACK_POLLING=true # Pomaga w odświeżaniu na Windows/WSL
